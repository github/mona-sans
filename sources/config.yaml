sources:
  - MonaSans.glyphspackage
familyName: "Mona Sans"
outputDir: "../googlefonts"
buildVariable: true
splitItalic: true
buildWebfont: false
buildOTF: false
buildTTF: false
axisOrder:
  - wdth
  - wght
  - opsz
  - ital
stat:
  MonaSans[opsz,wdth,wght].ttf:
  - name: Width
    tag: wdth
    values:
    - name: Condensed
      value: 75
    - name: SemiCondensed
      value: 87.5
    - name: Normal
      value: 100
      flags: 2
    - name: SemiExpanded
      value: 112.5
    - name: Expanded
      value: 125
  - name: Weight
    tag: wght
    values:
    - name: ExtraLight
      value: 200
    - name: Light
      value: 300
    - name: Regular
      value: 400
      linkedValue: 700
      flags: 2
    - name: Medium
      value: 500
    - name: SemiBold
      value: 600
    - name: Bold
      value: 700
    - name: ExtraBold
      value: 800
    - name: Black
      value: 900
  - name: Optical Size
    tag: opsz
    values:
    - name: 8pt
      value: 8
    - name: 14pt
      value: 14
    - name: 20pt
      value: 20
      flags: 2
    - name: 72pt
      value: 72
  - name: Italic
    tag: ital
    values:
    - name: Roman
      value: 0
      flags: 2
  MonaSans-Italic[opsz,wdth,wght].ttf:
  - name: Width
    tag: wdth
    values:
    - name: Condensed
      value: 75
    - name: SemiCondensed
      value: 87.5
    - name: Normal
      value: 100
      flags: 2
    - name: SemiExpanded
      value: 112.5
    - name: Expanded
      value: 125
  - name: Weight
    tag: wght
    values:
    - name: ExtraLight
      value: 200
    - name: Light
      value: 300
    - name: Regular
      value: 400
      linkedValue: 700
      flags: 2
    - name: Medium
      value: 500
    - name: SemiBold
      value: 600
    - name: Bold
      value: 700
    - name: ExtraBold
      value: 800
    - name: Black
      value: 900
  - name: Optical Size
    tag: opsz
    values:
    - name: 20pt
      value: 20
      flags: 2
    - name: 72pt
      value: 72
  - name: Italic
    tag: ital
    values:
    - name: Italic
      value: 1
      flags: 2